<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Redirigiendo...</title>

<script>
window.onload = function() {

    // Si hay historial, vuelve atrás
    if (window.history.length > 1) {
        window.history.back();
    } 
    
    // Si no hay historial (entró directo al enlace)
    else {
        window.location.href = "/";
    }

};
</script>

</head>
<body>

<p>Redirigiendo...</p>

</body>
</html>
